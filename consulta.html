<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BDR Construart - Patrimônio</title>
<link rel="stylesheet" href="./CSS/estilo.css">
</head>
<body>

<div class="card">
  <div class="logo">
    <img src="./imagens/logo.png" alt="Logo">
  </div>

  <h2 class="empresa">BDR CONSTRUART</h2>
  <p class="subtitulo">Controle de Patrimônio</p>

  <!-- Container para múltiplos resultados -->
  <div id="resultado">Carregando...</div>
</div>

<script>
// PEGAR ID DA URL
const params = new URLSearchParams(window.location.search);
let id = params.get("id");

// 🔧 Normalizar o formato do ID
if (id) {
  // Caso 1: QR antigo → empresa=bdr;numero=0456
  if (id.includes("numero=")) {
    const numero = id.split("numero=")[1];
    id = "PAT-" + numero;
  }
  // Caso 2: veio só número → 0456
  else if (!id.startsWith("PAT-")) {
    id = "PAT-" + id;
  }
} else {
  id = "SEM-ID";
}

// ✅ URL da planilha
const url = "https://docs.google.com/spreadsheets/d/1r1K8A6RwkGXBrHWLKc3otE5G3SWHBmFSXCWfNLDs7rQ/gviz/tq?tqx=out:json";

fetch(url)
.then(res => res.text())
.then(data => {
  const json = JSON.parse(data.substring(47).slice(0, -2));
  const rows = json.table.rows;

  let encontrado = false;
  let htmlResultados = "";

  rows.forEach(r => {
    if (r.c[0] && r.c[0].v.startsWith(id)) {
      encontrado = true;

      // Monta bloco de resultado
      htmlResultados += `
        <h1>${r.c[3]?.v || ""}</h1>
        <p><b>ID:</b> ${r.c[0]?.v || ""}</p>
        <p><b>Marca:</b> ${r.c[4]?.v || ""}</p>
        <p><b>Modelo:</b> ${r.c[5]?.v || ""}</p>
        <p><b>Série:</b> ${r.c[6]?.v || ""}</p>
        <p><b>Local:</b> ${r.c[9]?.v || ""}</p>
        <p><b>Valor:</b> R$ ${Number(r.c[11]?.v || 0).toFixed(2).replace(".", ",")}</p>
        <p><b>Status:</b> ${r.c[12]?.v || ""}</p>
      `;

      // ✅ DATA CORRIGIDA
      if (r.c[1] && r.c[1].v) {
        const dataGoogle = new Date(r.c[1].f || r.c[1].v);
        const dia = String(dataGoogle.getDate()).padStart(2, '0');
        const mes = String(dataGoogle.getMonth() + 1).padStart(2, '0');
        const ano = dataGoogle.getFullYear();
        htmlResultados += `<p><b>Data:</b> ${dia}/${mes}/${ano}</p>`;
      }

      htmlResultados += "<hr>";
    }
  });

  // ✅ Mostrar resultados ou mensagem
  if (encontrado) {
    document.getElementById("resultado").innerHTML = htmlResultados;
  } else {
    document.getElementById("resultado").innerText = "Nenhum item encontrado para este código.";
  }
})
.catch(error => {
  console.error(error);
  document.getElementById("resultado").innerText = "Erro ao carregar dados";
});
</script>

</body>
</html>
